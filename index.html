<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>华语绘本故事时间</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Noto Sans SC', 'Microsoft YaHei', sans-serif;
    background: #FBF7F0;
    color: #342C22;
    min-height: 100vh;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    pointer-events: none; z-index: 9999; opacity: 0.02;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-repeat: repeat; background-size: 256px;
  }

  .site-header {
    background: #342C22; color: #FBF7F0;
    padding: 1.25rem 1.5rem; text-align: center;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,0.15);
    display: flex; align-items: center; justify-content: center; gap: 1rem;
  }
  .site-header h1 {
    font-family: 'Noto Serif SC', serif;
    font-size: 1.3rem; font-weight: 700;
    letter-spacing: 0.05em; cursor: pointer;
  }
  .site-header .subtitle { font-size: 0.78rem; opacity: 0.6; }
  .header-right {
    position: absolute; right: 1rem;
    display: flex; align-items: center; gap: 0.6rem;
  }
  .header-user {
    font-size: 0.75rem; opacity: 0.7;
  }
  .header-btn {
    font-size: 0.72rem; padding: 0.3rem 0.7rem;
    border: 1px solid rgba(255,255,255,0.3); border-radius: 6px;
    background: none; color: #FBF7F0; cursor: pointer;
    font-family: 'Noto Sans SC', sans-serif;
    transition: all 0.2s;
  }
  .header-btn:hover { background: rgba(255,255,255,0.15); }

  .view { display: none; }
  .view.active { display: block; }

  /* LOGIN */
  .login-container {
    max-width: 400px; margin: 0 auto; padding: 3rem 1.5rem;
    text-align: center;
  }
  .login-container h2 {
    font-family: 'Noto Serif SC', serif;
    font-size: 1.6rem; font-weight: 700; margin-bottom: 0.5rem;
  }
  .login-container .login-sub {
    font-size: 0.88rem; color: #7A6D5E; margin-bottom: 2rem; line-height: 1.5;
  }
  .login-box {
    background: rgba(255,255,255,0.7);
    border: 1px solid rgba(209,199,186,0.4);
    border-radius: 14px; padding: 2rem;
    text-align: left;
  }
  .login-box label {
    display: block; font-size: 0.82rem; font-weight: 500;
    margin-bottom: 0.3rem; color: #594D3F;
  }
  .login-box input {
    width: 100%; padding: 0.65rem 0.9rem;
    border: 1px solid rgba(209,199,186,0.5); border-radius: 8px;
    font-size: 0.9rem; font-family: 'Noto Sans SC', sans-serif;
    background: #fff; margin-bottom: 1rem;
    outline: none; transition: border-color 0.2s;
  }
  .login-box input:focus { border-color: #C0433D; }
  .login-btn {
    width: 100%; padding: 0.7rem;
    background: #342C22; color: #FBF7F0;
    border: none; border-radius: 8px;
    font-size: 0.9rem; font-weight: 500;
    cursor: pointer; font-family: 'Noto Sans SC', sans-serif;
    transition: background 0.2s;
  }
  .login-btn:hover { background: #4A3F33; }
  .login-btn:disabled { opacity: 0.5; cursor: default; }
  .login-error {
    font-size: 0.8rem; color: #C0433D;
    margin-top: 0.75rem; display: none;
  }
  .login-toggle {
    font-size: 0.8rem; color: #7A6D5E;
    margin-top: 1.5rem; cursor: pointer;
  }
  .login-toggle a { color: #C0433D; text-decoration: underline; cursor: pointer; }

  /* HOME */
  .home-container { max-width: 700px; margin: 0 auto; padding: 2.5rem 1.5rem; }
  .home-intro { text-align: center; margin-bottom: 2rem; }
  .home-intro h2 { font-family: 'Noto Serif SC', serif; font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; }
  .home-intro p { font-size: 0.9rem; color: #7A6D5E; line-height: 1.6; }
  .grade-cards { display: flex; flex-direction: column; gap: 1rem; }
  .grade-card {
    background: rgba(255,255,255,0.7);
    border: 1px solid rgba(209,199,186,0.4);
    border-radius: 14px; padding: 1.5rem 1.8rem;
    cursor: pointer; transition: all 0.25s;
    display: flex; align-items: center; gap: 1.2rem;
  }
  .grade-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 24px rgba(0,0,0,0.08);
    border-color: rgba(192,67,61,0.3);
  }
  .grade-icon {
    width: 56px; height: 56px; border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.6rem; flex-shrink: 0;
  }
  .grade-card:nth-child(1) .grade-icon { background: #FDEBD0; }
  .grade-card:nth-child(2) .grade-icon { background: #D5F5E3; }
  .grade-card:nth-child(3) .grade-icon { background: #D6EAF8; }
  .grade-info h3 { font-family: 'Noto Serif SC', serif; font-size: 1.15rem; font-weight: 700; }
  .grade-info p { font-size: 0.82rem; color: #7A6D5E; margin-top: 0.2rem; }
  .grade-count {
    margin-left: auto; font-size: 0.75rem; color: #A89A8A;
    background: rgba(209,199,186,0.2); padding: 0.3rem 0.7rem;
    border-radius: 999px; white-space: nowrap;
  }

  /* GRADE LIST */
  .grade-container { max-width: 700px; margin: 0 auto; padding: 1.5rem; }
  .back-btn {
    display: inline-flex; align-items: center; gap: 0.4rem;
    font-size: 0.85rem; color: #7A6D5E; cursor: pointer;
    padding: 0.5rem 0; margin-bottom: 1rem;
    background: none; border: none;
    font-family: 'Noto Sans SC', sans-serif; transition: color 0.2s;
  }
  .back-btn:hover { color: #C0433D; }
  .grade-header {
    font-family: 'Noto Serif SC', serif; font-size: 1.3rem; font-weight: 700;
    margin-bottom: 1rem; padding-bottom: 0.75rem;
    border-bottom: 2px solid rgba(209,199,186,0.3);
  }
  .book-list { display: flex; flex-direction: column; gap: 0.6rem; }
  .book-item {
    display: flex; align-items: center; gap: 0.8rem;
    padding: 0.9rem 1.2rem;
    background: rgba(255,255,255,0.7);
    border: 1px solid rgba(209,199,186,0.3);
    border-radius: 10px; cursor: pointer; transition: all 0.2s;
    text-decoration: none; color: inherit;
  }
  .book-item:hover { background: rgba(192,67,61,0.05); border-color: rgba(192,67,61,0.25); }
  .book-item .item-num {
    font-family: 'Noto Serif SC', serif; font-weight: 900;
    font-size: 0.85rem; color: #A89A8A;
    width: 1.8rem; text-align: center; flex-shrink: 0;
  }
  .book-item .item-title { font-size: 0.95rem; font-weight: 500; flex: 1; }
  .book-item .item-en { font-size: 0.75rem; color: #A89A8A; margin-top: 0.15rem; }
  .book-item .item-arrow { color: #C0433D; font-size: 0.9rem; flex-shrink: 0; opacity: 0; transition: opacity 0.2s; }
  .book-item:hover .item-arrow { opacity: 1; }
  .book-item .read-check { color: #2E7048; font-size: 0.85rem; flex-shrink: 0; }

  /* PLAYER */
  .player-container { max-width: 900px; margin: 0 auto; padding: 1.5rem; }
  .video-container {
    position: relative; width: 100%; padding-bottom: 56.25%;
    background: #1A150F; border-radius: 12px; overflow: hidden;
    box-shadow: 0 8px 30px rgba(0,0,0,0.2); margin-bottom: 1.25rem;
  }
  .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
  .book-info {
    background: rgba(255,255,255,0.7);
    border: 1px solid rgba(209,199,186,0.4);
    border-radius: 12px; padding: 1.5rem 2rem; margin-bottom: 1rem;
  }
  .book-info .book-title { font-family: 'Noto Serif SC', serif; font-size: 1.5rem; font-weight: 700; line-height: 1.3; }
  .book-info .book-title-en { font-size: 0.95rem; color: #A89A8A; font-weight: 400; margin-left: 0.5rem; }
  .book-info .book-author { font-size: 0.88rem; color: #7A6D5E; margin-top: 0.4rem; }
  .book-info .book-note { font-size: 0.88rem; color: #594D3F; line-height: 1.6; margin-top: 0.75rem; padding-top: 0.75rem; border-top: 1px solid rgba(209,199,186,0.3); }
  .meta-badges { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.65rem; }
  .meta-badge { font-size: 0.72rem; font-weight: 500; padding: 0.25rem 0.7rem; border-radius: 999px; background: #F9EFE2; color: #7D4F2C; }
  .meta-badge.channel { background: #dce8d4; color: #2E7048; }
  .meta-badge.grade-tag { background: #D6EAF8; color: #2C5F8A; }
  .library-reminder {
    max-width: 900px; margin: 0 auto 1rem;
    padding: 1rem 1.5rem; background: rgba(62,142,96,0.08);
    border: 1px solid rgba(62,142,96,0.2); border-radius: 10px;
    font-size: 0.85rem; color: #2E7048;
    display: flex; align-items: center; gap: 0.75rem;
  }
  .library-icon { font-size: 1.5rem; flex-shrink: 0; }
  .player-nav { display: flex; justify-content: space-between; gap: 0.5rem; margin-top: 0.75rem; }
  .nav-btn {
    display: inline-flex; align-items: center; gap: 0.5rem;
    padding: 0.55rem 1.1rem;
    border: 1px solid rgba(209,199,186,0.5); border-radius: 8px;
    background: rgba(255,255,255,0.6); cursor: pointer;
    font-size: 0.82rem; color: #594D3F; transition: all 0.2s;
    font-family: 'Noto Sans SC', sans-serif;
  }
  .nav-btn:hover { background: #342C22; color: #FBF7F0; }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }
  .nav-btn:disabled:hover { background: rgba(255,255,255,0.6); color: #594D3F; }

  /* TEACHER DASHBOARD */
  .teacher-container { max-width: 1000px; margin: 0 auto; padding: 1.5rem; }
  .teacher-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem;
  }
  .teacher-header h2 { font-family: 'Noto Serif SC', serif; font-size: 1.3rem; font-weight: 700; }
  .teacher-tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
  .teacher-tab {
    padding: 0.5rem 1rem; border-radius: 8px;
    border: 1px solid rgba(209,199,186,0.5);
    background: rgba(255,255,255,0.6); cursor: pointer;
    font-size: 0.82rem; color: #594D3F;
    font-family: 'Noto Sans SC', sans-serif; transition: all 0.2s;
  }
  .teacher-tab.active { background: #342C22; color: #FBF7F0; border-color: #342C22; }
  .teacher-tab:hover:not(.active) { background: rgba(209,199,186,0.2); }

  /* Student management */
  .add-student-row {
    display: flex; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap;
  }
  .add-student-row input {
    padding: 0.55rem 0.8rem; border: 1px solid rgba(209,199,186,0.5);
    border-radius: 8px; font-size: 0.85rem;
    font-family: 'Noto Sans SC', sans-serif; outline: none;
    flex: 1; min-width: 120px;
  }
  .add-student-row input:focus { border-color: #C0433D; }
  .add-btn {
    padding: 0.55rem 1.2rem; background: #2E7048; color: #fff;
    border: none; border-radius: 8px; font-size: 0.82rem;
    cursor: pointer; font-family: 'Noto Sans SC', sans-serif;
    white-space: nowrap;
  }
  .add-btn:hover { background: #256B3B; }

  .student-table {
    width: 100%; border-collapse: collapse;
    background: rgba(255,255,255,0.7);
    border: 1px solid rgba(209,199,186,0.4);
    border-radius: 10px; overflow: hidden;
  }
  .student-table th, .student-table td {
    padding: 0.7rem 1rem; text-align: left;
    font-size: 0.85rem; border-bottom: 1px solid rgba(209,199,186,0.2);
  }
  .student-table th {
    background: rgba(209,199,186,0.15);
    font-weight: 600; color: #594D3F;
    font-size: 0.78rem;
  }
  .student-table tr:last-child td { border-bottom: none; }
  .student-table .del-btn {
    font-size: 0.75rem; color: #C0433D; cursor: pointer;
    background: none; border: none; padding: 0.2rem 0.5rem;
    font-family: 'Noto Sans SC', sans-serif;
  }
  .student-table .del-btn:hover { text-decoration: underline; }

  /* Reading records */
  .record-card {
    background: rgba(255,255,255,0.7);
    border: 1px solid rgba(209,199,186,0.4);
    border-radius: 10px; padding: 1.2rem 1.5rem;
    margin-bottom: 0.75rem;
  }
  .record-card h4 { font-size: 0.95rem; font-weight: 600; margin-bottom: 0.5rem; }
  .record-books { display: flex; flex-wrap: wrap; gap: 0.4rem; }
  .record-book {
    font-size: 0.72rem; padding: 0.2rem 0.6rem;
    border-radius: 999px; background: #D5F5E3; color: #2E7048;
  }
  .record-book.unread { background: #F0EDED; color: #A89A8A; }
  .record-time { font-size: 0.7rem; color: #A89A8A; margin-top: 0.4rem; }
  .record-stats {
    display: flex; gap: 1.5rem; margin-bottom: 1.5rem; flex-wrap: wrap;
  }
  .stat-card {
    background: rgba(255,255,255,0.7);
    border: 1px solid rgba(209,199,186,0.4);
    border-radius: 10px; padding: 1rem 1.5rem; flex: 1; min-width: 140px;
    text-align: center;
  }
  .stat-num { font-family: 'Noto Serif SC', serif; font-size: 2rem; font-weight: 900; color: #C0433D; }
  .stat-label { font-size: 0.78rem; color: #7A6D5E; margin-top: 0.2rem; }

  .no-firebase-msg {
    max-width: 600px; margin: 3rem auto; padding: 2rem;
    background: rgba(192,67,61,0.08); border: 1px solid rgba(192,67,61,0.2);
    border-radius: 12px; text-align: center;
  }
  .no-firebase-msg h3 { font-family: 'Noto Serif SC', serif; font-size: 1.1rem; margin-bottom: 0.5rem; color: #C0433D; }
  .no-firebase-msg p { font-size: 0.85rem; color: #594D3F; line-height: 1.6; }
  .no-firebase-msg code {
    display: block; background: #342C22; color: #FBF7F0;
    padding: 1rem; border-radius: 8px; margin-top: 1rem;
    font-size: 0.75rem; text-align: left; white-space: pre; overflow-x: auto;
  }

  @media (max-width: 600px) {
    .home-container { padding: 1.5rem 1rem; }
    .grade-card { padding: 1rem 1.2rem; }
    .grade-icon { width: 44px; height: 44px; font-size: 1.3rem; }
    .player-container { padding: 1rem; }
    .book-info { padding: 1rem 1.2rem; }
    .book-info .book-title { font-size: 1.2rem; }
    .book-info .book-title-en { display: block; margin-left: 0; margin-top: 0.15rem; }
    .header-right { position: static; }
    .site-header { flex-wrap: wrap; }
    .teacher-container { padding: 1rem; }
    .add-student-row { flex-direction: column; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<header class="site-header" id="site-header" style="display:none">
  <div style="text-align:center">
    <h1 onclick="showHome()">华语绘本故事时间</h1>
    <div class="subtitle">看完视频，去图书馆找到这本书吧！</div>
  </div>
  <div class="header-right">
    <span class="header-user" id="header-user"></span>
    <button class="header-btn" id="header-teacher-btn" style="display:none" onclick="showTeacher()">老师后台</button>
    <button class="header-btn" onclick="logout()">退出</button>
  </div>
</header>

<!-- LOGIN VIEW -->
<div class="view active" id="view-login">
  <div class="login-container">
    <h2>华语绘本故事时间</h2>
    <p class="login-sub">看完视频，去图书馆找到这本书吧！</p>
    <div class="login-box">
      <div id="login-student-form">
        <label>姓名</label>
        <input type="text" id="login-name" placeholder="输入你的姓名" autocomplete="off">
        <label>密码</label>
        <input type="password" id="login-pass" placeholder="输入密码">
        <button class="login-btn" onclick="doLogin()">登录</button>
        <div class="login-error" id="login-error">姓名或密码错误</div>
      </div>
      <div class="login-toggle">
        <a onclick="toggleTeacherLogin()">老师登录</a>
      </div>
      <div id="login-teacher-form" style="display:none">
        <label>老师密码</label>
        <input type="password" id="teacher-pass" placeholder="输入老师密码">
        <button class="login-btn" onclick="doTeacherLogin()">老师登录</button>
        <div class="login-error" id="teacher-error">密码错误</div>
        <div class="login-toggle" style="margin-top:1rem">
          <a onclick="toggleTeacherLogin()">学生登录</a>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- HOME VIEW -->
<div class="view" id="view-home">
  <div class="home-container">
    <div class="home-intro">
      <h2>选择年级</h2>
      <p>点击年级查看适合的绘本故事</p>
    </div>
    <div class="grade-cards">
      <div class="grade-card" onclick="showGrade(1)">
        <div class="grade-icon">🌱</div>
        <div class="grade-info"><h3>一年级</h3><p>简单有趣，培养阅读兴趣</p></div>
        <span class="grade-count" id="count-1"></span>
      </div>
      <div class="grade-card" onclick="showGrade(2)">
        <div class="grade-icon">🌿</div>
        <div class="grade-info"><h3>二年级</h3><p>故事丰富，拓展想象力</p></div>
        <span class="grade-count" id="count-2"></span>
      </div>
      <div class="grade-card" onclick="showGrade(3)">
        <div class="grade-icon">🌳</div>
        <div class="grade-info"><h3>三年级</h3><p>内容深入，引发思考</p></div>
        <span class="grade-count" id="count-3"></span>
      </div>
    </div>
  </div>
</div>

<!-- GRADE VIEW -->
<div class="view" id="view-grade">
  <div class="grade-container">
    <button class="back-btn" onclick="showHome()">&#9664; 返回选择年级</button>
    <div class="grade-header" id="grade-title"></div>
    <div class="book-list" id="book-list"></div>
  </div>
</div>

<!-- PLAYER VIEW -->
<div class="view" id="view-player">
  <div class="player-container">
    <button class="back-btn" id="back-to-grade">&#9664; 返回书单</button>
    <div class="video-container">
      <iframe id="video-player" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
    </div>
    <div class="book-info" id="book-info"></div>
    <div class="library-reminder">
      <span class="library-icon">📚</span>
      <span>看完这个故事了吗？去图书馆找到这本书，翻开它，你会发现更多视频里没有的精彩细节！</span>
    </div>
    <div class="player-nav">
      <button class="nav-btn" id="prev-btn" onclick="goBook(-1)">&#9664; 上一本</button>
      <button class="nav-btn" id="next-btn" onclick="goBook(1)">下一本 &#9654;</button>
    </div>
  </div>
</div>

<!-- TEACHER VIEW -->
<div class="view" id="view-teacher">
  <div class="teacher-container">
    <button class="back-btn" onclick="showHome()">&#9664; 返回首页</button>
    <div class="teacher-header">
      <h2>老师后台</h2>
    </div>
    <div class="teacher-tabs">
      <button class="teacher-tab active" onclick="showTeacherTab('records')">阅读记录</button>
      <button class="teacher-tab" onclick="showTeacherTab('students')">管理学生</button>
    </div>

    <!-- Records tab -->
    <div id="tab-records">
      <div class="record-stats" id="record-stats"></div>
      <div id="records-list"></div>
    </div>

    <!-- Students tab -->
    <div id="tab-students" style="display:none">
      <div class="add-student-row">
        <input type="text" id="new-student-name" placeholder="学生姓名">
        <input type="text" id="new-student-pass" placeholder="密码">
        <input type="text" id="new-student-class" placeholder="班级（选填）">
        <button class="add-btn" onclick="addStudent()">添加学生</button>
      </div>
      <table class="student-table" id="student-table">
        <thead><tr><th>姓名</th><th>密码</th><th>班级</th><th>已读</th><th></th></tr></thead>
        <tbody id="student-tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
/*==============================================================
  FIREBASE CONFIG — Replace with your own Firebase project config

/*==============================================================

function initFirebase() {
  if (firebaseConfig.apiKey === "YOUR_API_KEY") {
    firebaseReady = false;
    return;
  }
  try {
    firebase.initializeApp(firebaseConfig);
    db = firebase.firestore();

    console.error("Firebase init error:", e);
    firebaseReady = false;
  }
}

function switchView(id) {

function toggleTeacherLogin() {
  const sf = document.getElementById('login-student-form');
  const tf = document.getElementById('login-teacher-form');
  if (sf.style.display === 'none') {
    sf.style.display = ''; tf.style.display = 'none';
  } else {
    sf.style.display = 'none'; tf.style.display = '';
  }
}

async function doLogin() {
  const name = document.getElementById('login-name').value.trim();
  const pass = document.getElementById('login-pass').value.trim();
  const err = document.getElementById('login-error');
  err.style.display = 'none';

  if (!name || !pass) { err.textContent = '请输入姓名和密码'; err.style.display = 'block'; return; }

  if (!firebaseReady) {
    err.textContent = 'Firebase 尚未配置，请联系老师'; err.style.display = 'block'; return;
  }

  try {
    const snap = await db.collection('students').where('name', '==', name).where('password', '==', pass).get();
    if (snap.empty) {
      err.textContent = '姓名或密码错误'; err.style.display = 'block'; return;
    }
    const doc = snap.docs[0];
    currentUser = { name: doc.data().name, id: doc.id, isTeacher: false, className: doc.data().className || '' };
    sessionStorage.setItem('user', JSON.stringify(currentUser));
    enterApp();
  } catch (e) {
    err.textContent = '连接失败，请重试'; err.style.display = 'block';
    console.error(e);
  }
}

function doTeacherLogin() {
  const pass = document.getElementById('teacher-pass').value.trim();
  const err = document.getElementById('teacher-error');
  err.style.display = 'none';

  if (pass !== TEACHER_PASSWORD) {
    err.textContent = '密码错误'; err.style.display = 'block'; return;
  }
  currentUser = { name: '老师', id: 'teacher', isTeacher: true };
  sessionStorage.setItem('user', JSON.stringify(currentUser));
  enterApp();
}

function enterApp() {
  document.getElementById('site-header').style.display = '';
  document.getElementById('header-user').textContent = currentUser.name;
  if (currentUser.isTeacher) {
    document.getElementById('header-teacher-btn').style.display = '';

  showHome();
}

function logout() {
  document.getElementById('video-player').src = '';
  currentUser = null;
  sessionStorage.removeItem('user');
  document.getElementById('site-header').style.display = 'none';

  document.getElementById('login-name').value = '';
  document.getElementById('login-pass').value = '';

function showHome() {
  document.getElementById('video-player').src = '';

}

function showGrade(g) {
  currentGrade = g;
  currentGradeBooks = books.filter(b => b.grade === g);
  document.getElementById('grade-title').textContent = gradeNames[g] + ' — 绘本故事 (' + currentGradeBooks.length + '本)';
  renderBookList();
  switchView('grade');
}

async function renderBookList() {
  // Get user's read books
  let readSet = new Set();
  if (firebaseReady && currentUser && !currentUser.isTeacher) {
    try {
      const snap = await db.collection('records').where('userId', '==', currentUser.id).get();
      snap.forEach(doc => readSet.add(doc.data().bookId));
    } catch(e) {}
  }

  const list = document.getElementById('book-list');
  list.innerHTML = currentGradeBooks.map((b, i) => {
    const isRead = readSet.has(b.n);
    return `<a class="book-item" onclick="showPlayer(${i})">
      <span class="item-num">${String(i + 1).padStart(2, '0')}</span>
      <div style="flex:1">
        <div class="item-title">${b.title}</div>
        <div class="item-en">${b.en}</div>
      </div>
      ${isRead ? '<span class="read-check">&#10003; 已看</span>' : ''}
      <span class="item-arrow">&#9654;</span>
    </a>`;
  }).join('');
}

function showPlayer(idx) {
  currentBookIdx = idx;
  const b = currentGradeBooks[idx];

  document.getElementById('video-player').src =
    b.vid.startsWith('http') ? b.vid : 'https://safeshare.tv/x/' + b.vid;

  document.getElementById('book-info').innerHTML = `
    <div class="book-title">${b.title}<span class="book-title-en">${b.en}</span></div>
    <div class="book-author">${b.author}</div>
    <div class="meta-badges">
      <span class="meta-badge">${b.age}</span>
      <span class="meta-badge grade-tag">${gradeNames[b.grade]}</span>
      <span class="meta-badge channel">${b.channel}</span>
    </div>
    <div class="book-note">${b.note}</div>
  `;

  document.getElementById('prev-btn').disabled = idx === 0;
  document.getElementById('next-btn').disabled = idx === currentGradeBooks.length - 1;
  document.getElementById('back-to-grade').onclick = () => {
    document.getElementById('video-player').src = '';
    showGrade(currentGrade);
  };

  // Record this click
  recordRead(b);
  switchView('player');
}

async function recordRead(book) {
  if (!firebaseReady || !currentUser || currentUser.isTeacher) return;
  try {
    const docId = currentUser.id + '_' + book.n;
    await db.collection('records').doc(docId).set({
      userId: currentUser.id,
      userName: currentUser.name,
      userClass: currentUser.className || '',
      bookId: book.n,
      bookTitle: book.title,
      grade: book.grade,
      timestamp: firebase.firestore.FieldValue.serverTimestamp(),
      lastViewed: new Date().toISOString()
    }, { merge: true });
  } catch(e) {
    console.error("Record error:", e);
  }
}

function goBook(dir) {
  const next = currentBookIdx + dir;
  if (next >= 0 && next < currentGradeBooks.length) showPlayer(next);
}

  Teacher dashboard

function showTeacher() {
  if (!currentUser || !currentUser.isTeacher) return;
  loadRecords();
  loadStudents();
  switchView('teacher');
}

function showTeacherTab(tab) {
  document.querySelectorAll('.teacher-tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('tab-records').style.display = tab === 'records' ? '' : 'none';
  document.getElementById('tab-students').style.display = tab === 'students' ? '' : 'none';
  if (tab === 'records') loadRecords();
  if (tab === 'students') loadStudents();
}

async function loadRecords() {
  if (!firebaseReady) return;
  const statsEl = document.getElementById('record-stats');
  const listEl = document.getElementById('records-list');

  try {
    const [studentsSnap, recordsSnap] = await Promise.all([
      db.collection('students').get(),
      db.collection('records').get()
    ]);

    const students = {};
    studentsSnap.forEach(doc => {
      students[doc.id] = { name: doc.data().name, className: doc.data().className || '', books: new Set() };
    });

    let totalReads = 0;
    recordsSnap.forEach(doc => {
      const d = doc.data();
      if (students[d.userId]) {
        students[d.userId].books.add(d.bookId);
        totalReads++;
      }
    });

    const studentList = Object.values(students);
    const activeStudents = studentList.filter(s => s.books.size > 0).length;

    statsEl.innerHTML = `
      <div class="stat-card"><div class="stat-num">${studentList.length}</div><div class="stat-label">学生总数</div></div>
      <div class="stat-card"><div class="stat-num">${activeStudents}</div><div class="stat-label">已开始阅读</div></div>
      <div class="stat-card"><div class="stat-num">${totalReads}</div><div class="stat-label">总观看次数</div></div>
    `;

    // Sort: most books read first
    studentList.sort((a, b) => b.books.size - a.books.size);

    listEl.innerHTML = studentList.map(s => {
      const bookTags = books.map(b => {
        const isRead = s.books.has(b.n);
        return `<span class="record-book ${isRead ? '' : 'unread'}">${b.title}</span>`;
      }).join('');
      return `<div class="record-card">
        <h4>${s.name} ${s.className ? '(' + s.className + ')' : ''} — 已看 ${s.books.size}/20 本</h4>
        <div class="record-books">${bookTags}</div>
      </div>`;
    }).join('');

  } catch(e) {
    listEl.innerHTML = '<p style="color:#C0433D">加载失败，请重试</p>';
    console.error(e);
  }
}

async function loadStudents() {
  if (!firebaseReady) return;
  const tbody = document.getElementById('student-tbody');
  try {
    const snap = await db.collection('students').orderBy('name').get();
    // Also get record counts
    const recSnap = await db.collection('records').get();
    const readCounts = {};
    recSnap.forEach(doc => {
      const uid = doc.data().userId;
      readCounts[uid] = (readCounts[uid] || 0) + 1;
    });

    tbody.innerHTML = '';
    snap.forEach(doc => {
      const d = doc.data();
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${d.name}</td>
        <td style="font-family:monospace;font-size:0.8rem">${d.password}</td>
        <td>${d.className || '-'}</td>
        <td>${readCounts[doc.id] || 0} 本</td>
        <td><button class="del-btn" onclick="deleteStudent('${doc.id}','${d.name}')">删除</button></td>
      `;
      tbody.appendChild(tr);
    });
  } catch(e) {
    console.error(e);
  }
}

async function addStudent() {
  if (!firebaseReady) return;
  const nameEl = document.getElementById('new-student-name');
  const passEl = document.getElementById('new-student-pass');
  const classEl = document.getElementById('new-student-class');
  const name = nameEl.value.trim();
  const pass = passEl.value.trim();
  const cls = classEl.value.trim();

  if (!name || !pass) { alert('请输入姓名和密码'); return; }

  try {
    await db.collection('students').add({
      name: name,
      password: pass,
      className: cls,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    nameEl.value = ''; passEl.value = ''; classEl.value = '';
    loadStudents();
  } catch(e) {
    alert('添加失败，请重试');
    console.error(e);
  }
}

async function deleteStudent(id, name) {
  if (!confirm('确定删除学生 "' + name + '" 吗？')) return;
  try {
    await db.collection('students').doc(id).delete();
    loadStudents();
  } catch(e) { alert('删除失败'); }
}

/*==============================================================
  Keyboard navigation
  ==============================================================*/
document.addEventListener('keydown', (e) => {
  if (document.getElementById('view-player').classList.contains('active')) {
    if (e.key === 'ArrowLeft') goBook(-1);
    if (e.key === 'ArrowRight') goBook(1);
  }
  if (e.key === 'Escape') {
    if (document.getElementById('view-player').classList.contains('active')) {
      document.getElementById('video-player').src = '';
      showGrade(currentGrade);
    } else if (document.getElementById('view-grade').classList.contains('active')) {
      showHome();
    } else if (document.getElementById('view-teacher').classList.contains('active')) {
      showHome();
    }
  }
});
